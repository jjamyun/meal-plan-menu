<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Menu Selector</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Margarine&family=Schoolbell&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">

  <style>
    :root {
      --bg: #131212;
      --red: #FF000D;
      --white: #ffffff;
      --sub: #6B6B6B;
      --orange: #DA8103;
      --orange-stroke: #905500;

      --start-btn-w: 135px;
      --start-btn-h: 34px;

      --item-btn-w: 240px;
      --item-btn-h: 42px;
      --item-gap: 28px;

      --reroll-h: 36px;
      --radius-pill: 999px;

      --card-width: min(82vw, 364px);
      --grocery-offset: 20px;

      --note-rotate: -3deg;
      --menu-top: 20px;

      --grocery-blue: #006fb9;
      --grocery-paper: #F4EFA8;
      --grocery-pad: 30px;
      --grocery-title-size: 28px;
      --grocery-item-size: 20px;

      --grocery-rule-step: 34px;
      --rule-gap: 34px;
      --rule-thickness: 2px;
      --grocery-rule-offset: 12px;

      --headline-cover-height: 74px;
      --space-below-last-item: 48px;

      --ingredient-indent: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow-x: hidden;
      overflow-y: auto;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--white);
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: "Inter", sans-serif;
      font-weight: 700;
      padding: 0;
      background: none;
    }

    .start-wrap {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 100vh;
      padding: 32px;
    }

    .start-btn {
      width: var(--start-btn-w);
      height: var(--start-btn-h);
      background: var(--red);
      color: var(--white);
      border-radius: var(--radius-pill);
      font-weight: 700;
      font-size: 16px;
      line-height: 1;
      display: grid;
      place-items: center;
      text-align: center;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .start-btn:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
    }

    .start-btn:active {
      transform: scale(0.98);
    }

    /* EAT IMAGE */
    .eat-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.2s ease;
      overflow: hidden;
    }

    .eat-layer.show {
      opacity: 1;
    }

    .eat-image {
      width: min(34vw, 500px);
      max-width: 500px;
      max-height: 72vh;
      object-fit: contain;
      object-position: center;
      display: block;
      opacity: 0;
      transform: translateY(36px) scale(0.97);
      will-change: transform, opacity;
    }

    .eat-layer.hold .eat-image {
      animation: eatHold 1s ease forwards;
    }

    .eat-layer.exit .eat-image {
      animation: eatExit 3s cubic-bezier(.22, .8, .2, 1) forwards;
    }

    @keyframes eatHold {
      0% {
        opacity: 0;
        transform: translateY(36px) scale(0.97);
      }
      65% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes eatExit {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 1;
        transform: translateY(-130vh) scale(1);
      }
    }

    /* MENU SELECTION */
    .menu-screen {
      padding: 56px 24px 40px;
      opacity: 0;
      visibility: hidden;
      z-index: 2;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .menu-screen.ready {
      opacity: 1;
      visibility: visible;
    }

    .menu-shell {
      width: 100%;
      max-width: 860px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 38px;
      padding: 40px 0;
    }

    .items-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      transition: all 0.45s ease;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      opacity: 0;
      transform: translateY(20px);
      margin-bottom: var(--item-gap);
      transition:
        transform 0.34s ease,
        opacity 0.34s ease,
        max-height 0.34s ease,
        margin-bottom 0.34s ease,
        filter 0.28s ease;
      will-change: transform, opacity;
      max-height: 90px;
      overflow: hidden;
    }

    .menu-item:last-child {
      margin-bottom: 0;
    }

    .menu-item.show {
      opacity: 1;
      transform: translateY(0);
    }

    .menu-item.removing {
      opacity: 0;
      transform: translateY(-10px) scale(0.96);
      filter: blur(1px);
    }

    .menu-item.removed {
      opacity: 0 !important;
      transform: translateY(-14px) scale(0.94) !important;
      max-height: 0 !important;
      margin-bottom: 0 !important;
      pointer-events: none;
      overflow: hidden;
    }

    .selector-btn {
      position: relative;
      width: var(--item-btn-w);
      max-width: calc(100vw - 48px);
      height: var(--item-btn-h);
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid #000000;
      color: #000000;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.05;
      text-align: center;
      display: grid;
      place-items: center;
      padding: 0 20px;
      transition:
        opacity 0.25s ease,
        transform 0.22s ease,
        background 0.25s ease,
        box-shadow 0.25s ease;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      touch-action: manipulation;
    }

    .selector-btn .value {
      display: inline-block;
      transform-origin: center;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .selector-btn.blank {
      opacity: 0.5;
    }

    .selector-btn.filled {
      opacity: 0.78;
    }

    .selector-btn.locked {
      opacity: 1;
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 0 0 0 rgba(255,255,255,0);
    }

    .selector-btn.lock-bump {
      animation: lockBump 0.26s ease;
    }

    @keyframes lockBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .selector-btn.shuffling .value {
      animation: shuffleText 0.36s ease;
    }

    @keyframes shuffleText {
      0% { opacity: 1; transform: translateY(0); }
      45% { opacity: 0; transform: translateY(-10px); }
      55% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .selector-btn.unlocking {
      animation: unlockPulse 0.28s ease;
    }

    @keyframes unlockPulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.96); }
      100% { transform: scale(1); }
    }

    .subtext {
      margin-top: 6px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1;
      text-align: center;
    }

    .controls {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .controls.show {
      opacity: 1;
      transform: translateY(0);
    }

    .reroll-btn {
      width: auto;
      min-width: 100px;
      height: var(--reroll-h);
      padding: 0 16px;
      border-radius: var(--radius-pill);
      background: var(--orange);
      border: 2px solid var(--orange-stroke);
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      line-height: 1;
      text-align: center;
      display: inline-grid;
      place-items: center;
      white-space: nowrap;
      opacity: 1;
      transition: transform 0.2s ease, opacity 0.25s ease, filter 0.2s ease;
    }

    .reroll-btn:hover {
      transform: scale(1.03);
      filter: brightness(1.03);
    }

    .reroll-btn:active {
      transform: scale(0.98);
    }

    .fade-out-all {
      opacity: 0 !important;
      transform: translateY(18px) !important;
      pointer-events: none !important;
      transition: opacity 0.45s ease, transform 0.45s ease !important;
    }

    /* FINAL STACK */
    .final-screen {
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 18px;
      overflow-y: auto;
      min-height: 100vh;

      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .final-screen.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .menu-note-wrap {
      position: relative;
      display: grid;
      place-items: center;
      transform: translateY(110vh);
      opacity: 0;
    }

    .final-screen.show .menu-note-wrap {
      animation: noteUp 0.95s cubic-bezier(.18, .84, .2, 1) forwards;
    }

    @keyframes noteUp {
      0% {
        transform: translateY(110vh);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .stack {
      position: relative;
      width: calc(var(--card-width) + var(--grocery-offset));
    }

    .menu-note,
    .grocery-note {
      width: var(--card-width);
      box-shadow: 0 10px 40px rgba(0,0,0,0.24);
      border-radius: 0;
      transition:
        transform 0.32s cubic-bezier(.22,.8,.2,1),
        top 0.32s cubic-bezier(.22,.8,.2,1),
        left 0.32s cubic-bezier(.22,.8,.2,1),
        z-index 0s linear 0.16s;
    }

    .grocery-note {
      position: absolute;
      top: 0;
      left: var(--grocery-offset);
      overflow: hidden;
      background-color: var(--grocery-paper);
      z-index: 1;
      pointer-events: auto;
    }

    .grocery-note::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(var(--rule-gap) - var(--rule-thickness)),
          var(--grocery-blue) calc(var(--rule-gap) - var(--rule-thickness)),
          var(--grocery-blue) var(--rule-gap)
        );
      background-repeat: repeat;
      background-position: 0 var(--grocery-rule-offset);
    }

    .headline-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--headline-cover-height);
      background: var(--grocery-paper);
      z-index: 1;
      pointer-events: none;
    }

    .grocery-note.front {
      z-index: 3;
      transform: translateX(-10px) translateY(-6px);
    }

    .grocery-note.behind {
      z-index: 1;
      transform: translateX(0) translateY(0);
    }

    .grocery-note.shuffling-out {
      transform: translateX(-18px) translateY(-8px);
    }

    .grocery-inner {
      position: relative;
      z-index: 2;
      padding: var(--grocery-pad);
      display: flex;
      flex-direction: column;
    }

    .grocery-title {
      margin: 0;
      padding: 0;
      font-family: "Margarine", cursive;
      font-size: var(--grocery-title-size);
      line-height: 1.1;
      color: #111;
      position: relative;
      z-index: 2;
      text-align: left;
    }

    .headline-rule {
      height: 20px;
      width: 100%;
      flex: 0 0 auto;
    }

    .grocery-list {
      display: flex;
      flex-direction: column;
      margin-top: 0;
      flex: 1;
      position: relative;
      padding-bottom: var(--space-below-last-item);
    }

    .grocery-row {
      position: relative;
      height: var(--grocery-rule-step);
      min-height: var(--grocery-rule-step);
      cursor: pointer;
      touch-action: pan-y;
      overflow: visible;
    }

    .grocery-hit {
      position: absolute;
      top: 0;
      bottom: 0;
      left: calc(-1 * var(--grocery-pad));
      right: calc(-1 * var(--grocery-pad));
      z-index: 1;
    }

    .grocery-text {
      position: relative;
      z-index: 3;
      font-family: "Schoolbell", cursive;
      font-size: var(--grocery-item-size);
      line-height: 1.15;
      color: #111;
      display: inline-block;
      transform: translateY(3px);
      white-space: normal;
      word-break: break-word;
      text-align: left;
    }

    .grocery-row.child .grocery-text {
      margin-left: var(--ingredient-indent);
      font-size: var(--grocery-item-size);
      transform: translateY(3px);
    }

    .grocery-strike-wrap {
      position: absolute;
      left: 0;
      right: 0;
      top: -6px;
      bottom: 0;
      z-index: 2;
      pointer-events: none;
    }

    .grocery-strike {
      position: absolute;
      left: -3px;
      top: 17px;
      height: 8px;
      border-radius: 999px;
      opacity: 0;
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform .2s ease, opacity .2s ease, width .2s ease;
      pointer-events: none;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: left center;
      filter: saturate(1.05);
    }

    .grocery-row.child .grocery-strike {
      left: calc(var(--ingredient-indent) - 3px);
    }

    .grocery-row.crossed .grocery-strike {
      opacity: .9;
      transform: scaleX(1);
    }

    .menu-note {
      position: absolute;
      top: var(--menu-top);
      left: 0;
      height: auto;
      margin: 0;
      padding: 1px 4px 60px 0px;
      background: #F3F3F3;
      color: #000000;
      transform: rotate(var(--note-rotate));
      transform-origin: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      touch-action: manipulation;
    }

    .menu-note.front {
      z-index: 3;
      transform: translateX(0) translateY(0) rotate(var(--note-rotate));
    }

    .menu-note.behind {
      z-index: 1;
      transform: translateX(0) translateY(20px) rotate(var(--note-rotate));
    }

    .menu-note.revealed {
      transform: translateX(14px) translateY(12px) rotate(var(--note-rotate));
    }

    .menu-note.shuffling-out {
      transform: translateX(18px) translateY(-8px) rotate(-5deg);
    }

    .note-title {
      display: block;
      font-family: "Inter", sans-serif;
      font-weight: 800;
      font-size: 120px;
      line-height: 0.88;
      letter-spacing: -0.03em;
      color: #000000;
      margin: 0 auto;
      white-space: nowrap;
      position: relative;
    }

    .note-line {
      width: 80px;
      max-width: 70%;
      height: 1px;
      background: #000000;
      margin: 30px auto 0;
    }

    .note-items {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: 100%;
    }

    .note-entry {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-align: center;
    }

    .note-value {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.1;
      color: #000000;
    }

    .note-category {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      line-height: 1.1;
      color: #6B6B6B;
    }

    @media (max-width: 640px) {
      :root {
        --item-btn-w: 220px;
        --item-btn-h: 40px;
        --item-gap: 24px;
        --reroll-h: 34px;
        --card-width: min(64vw, 640px);
        --grocery-offset: 20px;
        --grocery-pad: 24px;
        --grocery-title-size: 28px;
        --grocery-item-size: 18px;
      }

      .selector-btn {
        font-size: 16px;
        padding: 0 16px;
      }

      .subtext {
        font-size: 11px;
        margin-top: 6px;
      }

      .menu-shell {
        gap: 34px;
      }

      .eat-image {
        width: min(120vw, 600px);
        max-width: 600px;
        max-height: 120vh;
      }

      .menu-note {
        padding: 0px 3px 60px 0px;
      }

      .note-title {
        font-size: 84px;
      }

      .note-line {
        margin-top: 24px;
      }

      .note-items {
        margin-top: 24px;
        gap: 24px;
      }

      .note-value {
        font-size: 16px;
      }

      .note-category {
        font-size: 13px;
      }
      
      .grocery-text {
        transform: translateY(10px);
      }

      .grocery-row.child .grocery-text {
        transform: translateY(10px);
      }

      .grocery-strike {
        transform: translateY(6px) scaleX(0);
      }

      .grocery-row.crossed .grocery-strike {
        transform: translateY(6px) scaleX(1);
      }

      .reroll-btn {
        font-size: 14px;
        padding: 0 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="screen start-screen" id="startScreen">
      <div class="start-wrap">
        <button class="start-btn" id="startBtn">Let’s Eat</button>
      </div>
    </section>

    <div class="eat-layer" id="eatLayer" aria-hidden="true">
      <img class="eat-image" id="eatImage" src="EAT PNG.png" alt="Eat graphic" />
    </div>

    <section class="screen menu-screen" id="menuScreen">
      <div class="menu-shell">
        <div class="items-group" id="itemsGroup"></div>

        <div class="controls" id="controls">
          <button class="reroll-btn" id="rerollBtn">Select Items</button>
        </div>
      </div>
    </section>

    <section class="screen final-screen" id="finalScreen">
      <div class="menu-note-wrap">
        <div class="stack" id="stack">
          <div class="grocery-note behind" id="groceryNote">
            <div class="headline-cover"></div>

            <div class="grocery-inner" id="groceryInner">
              <h2 class="grocery-title">GROCERY LlST</h2>
              <div class="headline-rule"></div>
              <div class="grocery-list" id="groceryList"></div>
            </div>
          </div>

          <div class="menu-note front" id="menuNote">
            <h1 class="note-title">MENU</h1>
            <div class="note-line"></div>
            <div class="note-items" id="noteItems"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

    const state = {
      started: false,
      hasSelected: false,
      finished: false,
      items: [],
      groceryOpen: false,
      menuLastTap: 0,
      groceryLastTap: 0
    };

    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const eatLayer = document.getElementById("eatLayer");
    const menuScreen = document.getElementById("menuScreen");
    const itemsGroup = document.getElementById("itemsGroup");
    const controls = document.getElementById("controls");
    const rerollBtn = document.getElementById("rerollBtn");
    const finalScreen = document.getElementById("finalScreen");
    const noteItems = document.getElementById("noteItems");
    const groceryNote = document.getElementById("groceryNote");
    const groceryInner = document.getElementById("groceryInner");
    const groceryList = document.getElementById("groceryList");
    const menuNote = document.getElementById("menuNote");
    const stack = document.getElementById("stack");

    function sample(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function getVisibleItems() {
      return state.items.filter(item => !item.removed);
    }

    function getLockedVisibleItems() {
      return state.items.filter(item => !item.removed && item.locked);
    }

    function createCrayonStrokeDataURL(width, height) {
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(24, Math.ceil(width));
      canvas.height = Math.max(12, Math.ceil(height));

      const ctx = canvas.getContext("2d");
      const startX = 2;
      const endX = canvas.width - 2;
      const centerY = canvas.height / 2;
      const radius = height / 2;

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function drawDot(x, y, w, h, a) {
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.ellipse(x, y, w / 2, h / 2, rand(-0.5, 0.5), 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#d62828";

      for (let i = 0; i < Math.max(700, width * 7); i++) {
        const x = rand(startX + radius, endX - radius);
        const y = centerY + rand(-radius * 0.65, radius * 0.65);
        drawDot(x, y, rand(1.2, 3.8), rand(0.9, 2.6), rand(0.7, 1));
      }

      for (let i = 0; i < Math.max(450, width * 4); i++) {
        const x = rand(startX + radius, endX - radius);
        const y = centerY + rand(-radius, radius);
        drawDot(x, y, rand(1, 3), rand(0.8, 2), rand(0.35, 0.7));
      }

      for (let i = 0; i < Math.max(320, width * 3); i++) {
        const x = rand(startX + radius, endX - radius);
        const y = centerY + rand(-radius, radius);
        drawDot(x, y, rand(0.4, 1.2), rand(0.4, 1), rand(0.25, 0.6));
      }

      for (let i = 0; i < Math.max(220, width * 2); i++) {
        const x = rand(startX + radius, endX - radius);
        const top = centerY - radius + rand(-1.4, 1.4);
        const bottom = centerY + radius + rand(-1.4, 1.4);

        drawDot(x, top, rand(0.7, 2), rand(0.6, 1.3), rand(0.15, 0.35));
        drawDot(x, bottom, rand(0.7, 2), rand(0.6, 1.3), rand(0.15, 0.35));
      }

      ctx.globalAlpha = 1;
      return canvas.toDataURL("image/png");
    }

    function updateStrikeWidth(row) {
      const label = row.querySelector(".grocery-text");
      const strike = row.querySelector(".grocery-strike");
      if (!label || !strike) return;

      const strikeWidth = Math.ceil(label.getBoundingClientRect().width + 5);
      const strikeHeight = Math.max(8, Math.ceil(strike.getBoundingClientRect().height || 8));

      strike.style.width = `${strikeWidth}px`;
      strike.style.backgroundImage = `url(${createCrayonStrokeDataURL(strikeWidth, strikeHeight)})`;
    }

    function adjustPaperHeight() {
      const rows = groceryList.querySelectorAll(".grocery-row");

      if (!rows.length) {
        groceryNote.style.height = "auto";
        syncStackHeight();
        return;
      }

      const lastRow = rows[rows.length - 1];
      const lastRowBottom = lastRow.offsetTop + lastRow.offsetHeight;
      const listTop = groceryList.offsetTop;
      const innerBottomPadding = parseFloat(getComputedStyle(groceryInner).paddingBottom) || 0;
      const extraSpace =
        parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--space-below-last-item")) || 50;

      const totalHeight = listTop + lastRowBottom + extraSpace + innerBottomPadding;
      groceryNote.style.height = `${Math.ceil(totalHeight)}px`;

      syncStackHeight();
    }

    function syncStackHeight() {
      requestAnimationFrame(() => {
        const menuTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--menu-top')) || 0;
        const menuH = menuNote.offsetHeight + menuTop;
        const groceryH = groceryNote.offsetHeight || 0;
        stack.style.height = Math.max(menuH, groceryH) + "px";
      });
    }

    function buildGroceryEntries(lockedItems) {
      const entries = [];

      lockedItems.forEach(item => {
        if (GROCERY_SKIP.has(item.value)) return;

        const mappedIngredients = INGREDIENT_MAP[item.value];

        if (mappedIngredients) {
          entries.push({ text: item.value, child: false });
          mappedIngredients.forEach(ingredient => {
            entries.push({ text: ingredient, child: true });
          });
          return;
        }

        if (GROCERY_DIRECT.has(item.value)) {
          entries.push({ text: item.value, child: false });
        }
      });

      return entries;
    }

    function finishToFinal() {
      if (state.finished) return;
      state.finished = true;

      itemsGroup.classList.add("fade-out-all");
      controls.classList.add("fade-out-all");

      setTimeout(() => {
        renderFinalMenu();
        renderGroceryList();
        menuNote.classList.add("front");
        groceryNote.classList.add("behind");
        finalScreen.classList.add("show");
        syncStackHeight();
      }, 480);
    }

    function renderFinalMenu() {
      const lockedItems = getLockedVisibleItems();
      noteItems.innerHTML = "";

      lockedItems.forEach(item => {
        const entry = document.createElement("div");
        entry.className = "note-entry";

        const value = document.createElement("div");
        value.className = "note-value";
        value.textContent = item.value;

        const category = document.createElement("div");
        category.className = "note-category";
        category.textContent = item.category;

        entry.appendChild(value);
        entry.appendChild(category);
        noteItems.appendChild(entry);
      });
    }

    function createGroceryRow(text, isChild = false) {
      const row = document.createElement("div");
      row.className = isChild ? "grocery-row child" : "grocery-row";

      const hit = document.createElement("div");
      hit.className = "grocery-hit";

      const label = document.createElement("div");
      label.className = "grocery-text";
      label.textContent = text;

      const strikeWrap = document.createElement("div");
      strikeWrap.className = "grocery-strike-wrap";

      const strike = document.createElement("div");
      strike.className = "grocery-strike";

      strikeWrap.appendChild(strike);
      row.appendChild(hit);
      row.appendChild(label);
      row.appendChild(strikeWrap);

      requestAnimationFrame(() => {
        updateStrikeWidth(row);
        adjustPaperHeight();
      });

      let startX = 0;
      let tracking = false;

      row.addEventListener("pointerdown", (e) => {
        startX = e.clientX;
        tracking = true;
      });

      row.addEventListener("pointerup", (e) => {
        if (!tracking) return;
        tracking = false;

        const dx = e.clientX - startX;

        if (dx > 34) {
          row.classList.add("crossed");
        } else if (dx < -34) {
          row.classList.remove("crossed");
        }
      });

      row.addEventListener("pointercancel", () => {
        tracking = false;
      });

      return row;
    }

    function renderGroceryList() {
      groceryList.innerHTML = "";

      const lockedItems = getLockedVisibleItems();
      const entries = buildGroceryEntries(lockedItems);

      entries.forEach(entry => {
        groceryList.appendChild(createGroceryRow(entry.text, entry.child));
      });

      requestAnimationFrame(() => {
        groceryList.querySelectorAll(".grocery-row").forEach(updateStrikeWidth);
        adjustPaperHeight();
      });
    }

    function setGroceryOpen(open) {
      state.groceryOpen = open;

      if (open) {
        menuNote.classList.add("shuffling-out");

        setTimeout(() => {
          menuNote.classList.remove("front");
          menuNote.classList.add("revealed", "behind");

          groceryNote.classList.remove("behind");
          groceryNote.classList.add("front", "shuffling-out");

          requestAnimationFrame(() => {
            menuNote.classList.remove("shuffling-out");
            groceryNote.classList.remove("shuffling-out");
          });
        }, 120);
      } else {
        groceryNote.classList.add("shuffling-out");

        setTimeout(() => {
          groceryNote.classList.remove("front");
          groceryNote.classList.add("behind");

          menuNote.classList.remove("revealed", "behind");
          menuNote.classList.add("front", "shuffling-out");

          requestAnimationFrame(() => {
            groceryNote.classList.remove("shuffling-out");
            menuNote.classList.remove("shuffling-out");
          });
        }, 120);
      }

      syncStackHeight();
    }

    menuNote.addEventListener("pointerup", () => {
      if (!state.finished) return;
      const now = Date.now();
      if (now - state.menuLastTap < 280) {
        setGroceryOpen(true);
        state.menuLastTap = 0;
      } else {
        state.menuLastTap = now;
      }
    });

    groceryNote.addEventListener("pointerup", () => {
      if (!state.finished || !state.groceryOpen) return;
      const now = Date.now();
      if (now - state.groceryLastTap < 280) {
        setGroceryOpen(false);
        state.groceryLastTap = 0;
      } else {
        state.groceryLastTap = now;
      }
    });

    function animateShuffle(item, newValue) {
      item.button.classList.add("shuffling");

      setTimeout(() => {
        item.value = newValue;
        item.valueEl.textContent = newValue;
        item.button.classList.remove("blank");
        item.button.classList.add("filled");
      }, 140);

      setTimeout(() => {
        item.button.classList.remove("shuffling");
      }, 380);
    }

    function populateAll() {
      state.items.forEach((item) => {
        if (item.removed || item.locked) return;
        animateShuffle(item, sample(DATA[item.category]));
      });
    }

    function lockItem(item) {
      if (item.locked || item.removed || !item.value) return;
      item.locked = true;
      item.button.classList.add("locked", "lock-bump");
      setTimeout(() => item.button.classList.remove("lock-bump"), 260);
    }

    function unlockItem(item) {
      if (!item.locked || item.removed) return;
      item.locked = false;
      item.button.classList.remove("locked");
      item.button.classList.add("unlocking");
      setTimeout(() => item.button.classList.remove("unlocking"), 280);
    }

    function removeItem(item) {
      if (item.removed || item.locked) return;
      item.removing = true;
      item.el.classList.add("removing");
      clearTimeout(item.clickTimer);

      setTimeout(() => {
        item.removed = true;
        item.removing = false;
        item.el.classList.remove("removing");
        item.el.classList.add("removed");
        checkComplete();
      }, 170);
    }

    function checkComplete() {
      if (state.finished) return;

      const visible = getVisibleItems();
      const lockedVisible = getLockedVisibleItems();

      if (visible.length > 0 && lockedVisible.length === visible.length) {
        finishToFinal();
      }
    }

    function createItem(category, index) {
      const item = {
        id: category.toLowerCase().replace(/\s+/g, "-"),
        category,
        value: "",
        locked: false,
        removed: false,
        removing: false,
        lastTap: 0,
        longPressTimer: null,
        longPressTriggered: false,
        clickTimer: null
      };

      const wrap = document.createElement("div");
      wrap.className = "menu-item";
      wrap.dataset.category = category;

      const button = document.createElement("button");
      button.className = "selector-btn blank";
      button.type = "button";
      button.setAttribute("aria-label", category);

      const value = document.createElement("span");
      value.className = "value";
      value.textContent = "";

      const subtext = document.createElement("div");
      subtext.className = "subtext";
      subtext.textContent = category;

      button.appendChild(value);
      wrap.appendChild(button);
      wrap.appendChild(subtext);

      item.el = wrap;
      item.button = button;
      item.valueEl = value;
      item.subtext = subtext;

      button.addEventListener("pointerdown", () => {
        if (item.removed || item.removing) return;

        item.longPressTriggered = false;
        clearTimeout(item.longPressTimer);

        item.longPressTimer = setTimeout(() => {
          if (item.locked) {
            unlockItem(item);
            item.longPressTriggered = true;
          }
        }, 520);
      });

      button.addEventListener("pointerup", () => {
        clearTimeout(item.longPressTimer);

        if (item.longPressTriggered) {
          item.longPressTriggered = false;
          return;
        }

        if (!state.hasSelected) return;
        if (item.removed || item.removing) return;
        if (!item.value) return;

        const now = Date.now();

        if (!item.locked && now - item.lastTap < 280) {
          clearTimeout(item.clickTimer);
          item.lastTap = 0;
          removeItem(item);
          return;
        }

        item.lastTap = now;

        if (!item.locked) {
          clearTimeout(item.clickTimer);
          item.clickTimer = setTimeout(() => {
            lockItem(item);
            checkComplete();
          }, 240);
        }
      });

      button.addEventListener("pointerleave", () => clearTimeout(item.longPressTimer));
      button.addEventListener("pointercancel", () => clearTimeout(item.longPressTimer));

      setTimeout(() => wrap.classList.add("show"), Math.max(0, -480 + index * 90));

      return item;
    }

    function buildMenu() {
      itemsGroup.innerHTML = "";
      controls.classList.remove("show");
      itemsGroup.classList.remove("fade-out-all");
      controls.classList.remove("fade-out-all");

      state.items = CATEGORIES.map((category, index) => {
        const item = createItem(category, index);
        itemsGroup.appendChild(item.el);
        return item;
      });

      setTimeout(() => controls.classList.add("show"), 260);
    }

    startBtn.addEventListener("click", () => {
      if (state.started) return;
      state.started = true;

      startScreen.classList.add("hidden");
      eatLayer.classList.add("show", "hold");

      setTimeout(() => {
        eatLayer.classList.remove("hold");
        eatLayer.classList.add("exit");
      }, 1100);

      setTimeout(() => {
        menuScreen.classList.add("ready");
        buildMenu();
      }, 1300);

      setTimeout(() => {
        eatLayer.classList.remove("show", "exit");
      }, 2200);
    });

    rerollBtn.addEventListener("click", () => {
      if (state.finished) return;

      if (!state.hasSelected) {
        state.hasSelected = true;
        rerollBtn.textContent = "Re-Roll";
      }

      populateAll();
    });

    window.addEventListener("resize", () => {
      if (state.finished) {
        groceryList.querySelectorAll(".grocery-row").forEach(updateStrikeWidth);
        adjustPaperHeight();
      }
    });
  </script>
